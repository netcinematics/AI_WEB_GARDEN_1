<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000b0b">
    <title>AI_WEB_GARDEN | Gemma_Web_Engine v12</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>    
    
    <style>
        body { margin: 0; background: #000b0b; color: #00ffcc; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; width: 100vw; height: 100vh; }
        * { box-sizing: border-box; user-select: none; }
        .monospace-text { font-family: 'Courier New', Courier, monospace; }

        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .interactzone { pointer-events: auto; background: rgba(0, 15, 20, 0.85); border: 1px solid rgba(0, 255, 204, 0.3); backdrop-filter: blur(12px); border-radius: 8px; }
        
        #overlay-vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.9) 100%); pointer-events: none; z-index: 2; }

        .title-panel { position: absolute; top: 1.5rem; left: 1.5rem; padding: 1.25rem; border-left: 4px solid #ff00ff; width: 55%; max-width: 600px; display: flex; flex-direction: column; gap: 0.25rem; }
        .domain-select { background: rgba(0,0,0,0.8); border: 1px solid rgba(0,255,204,0.5); padding: 0.5rem; font-size: 1rem; font-weight: bold; width: 100%; color: #00ffcc; cursor: pointer; }
        .domain-select:focus { border-color: #ff00ff; outline: none; }

        #logFeed { position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%); width: 80%; height: 25vh; border-top: 2px solid #ff00ff; background: rgba(0, 15, 20, 0.85); overflow-y: auto; padding: 1rem; color: #d1fae5; font-size: 0.875rem; line-height: 1.6; user-select: text; }
        
        .status-dot { width: 0.5rem; height: 0.5rem; border-radius: 50%; display: inline-block; margin-right: 0.5rem; }
        .status-dot.red { background-color: #ef4444; }
        .status-dot.green { background-color: #00ffcc; animation: pulse 2s infinite; }
        .status-dot.yellow { background-color: #facc15; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="overlay-vignette"></div>

    <div class="ui-layer">
        <div class="interactzone" style="position: absolute; top: 1rem; right: 1rem; padding: 0.5rem 1rem;">
            <div id="llmStatusDot" class="status-dot green"></div>
            <span id="llmStatus" class="monospace-text" style="font-size: 10px; font-weight: bold; color: #00ffcc;">LLM STANDBY</span>
        </div>

        <div class="title-panel interactzone">
            <h1 class="monospace-text" style="color:#00ffcc; font-size: 1.2rem; font-weight: bold; text-transform: uppercase;">AI_WEB_GARDEN | v12</h1>
            <p class="monospace-text" style="font-size: 12px; color:skyblue; margin-bottom: 1rem;"><b>✺ PHASE_4 : AXIOMIC_DIALECTICS & CONCEPT_MATH</b></p>
            
            <select id="domain-select" class="domain-select monospace-text" onchange="triggerConceptInference(this.value)">
                <option value="" disabled selected> ❋ AXIOMIC_SUBFUNCTIONS:</option>
                <option value="test_4_1">4.1) SOCRATIC_ELENCHUS (Aporia Spiral)</option>
                <option value="test_4_2">4.2) KANTIAN_ANTINOMY (Irresolvable Paradox)</option>
                <option value="test_4_3">4.3) CONCEPT_MATH (Latent Vector Translation)</option>
            </select>
        </div>

        <div id="logFeed" class="interactzone monospace-text">
            <div style="opacity: 0.5;">[SYS] PFC_Cortical_Shell V12 initialized.</div>
            <div style="opacity: 0.5;">[SYS] Ready for AXIOMIC_DIALECTICS.</div>
        </div>
    </div>

    <script>
        // --- 3D ENGINE SETUP ---
        let scene, camera, renderer, controls;
        let orbGroup = []; 
        let ACTIVE_VIEW_DATA = [];
        window.CURRENT_LINK_MODE = 'RADIAL'; // Modes: RADIAL, SEQUENTIAL, VECTOR, NONE

        const TOPOLOGY_COLORS = [0xff0044, 0x00ffcc, 0xffaa00, 0x0066ff, 0xff00ff, 0x00ff00, 0x8800ff, 0xff33ff];

        function init3D() {
            scene = new THREE.Scene(); 
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 80, 100); 
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight); 
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; controls.dampingFactor = 0.05; controls.autoRotate = true; controls.autoRotateSpeed = 0.5;
            
            const ambient = new THREE.AmbientLight(0xffffff, 0.3); scene.add(ambient);
            const spot1 = new THREE.DirectionalLight(0xffffff, 0.9); spot1.position.set(20, 50, 20); scene.add(spot1);
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight; 
                camera.updateProjectionMatrix(); 
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            animate();
            renderGallery(); // Render empty/initial state
        }

        // --- CANVAS TEXTURE LABEL GENERATOR ---
        function createDynamicLabel(text, size, colorHex) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512; canvas.height = 128;
            
            ctx.fillStyle = 'rgba(0, 15, 20, 0.85)';
            ctx.strokeStyle = '#' + colorHex.toString(16).padStart(6, '0');
            ctx.lineWidth = 4;
            
            ctx.beginPath();
            ctx.roundRect(16, 32, canvas.width - 32, 64, 12);
            ctx.fill(); ctx.stroke();
            
            let fontSize = text.length > 25 ? 20 : 28;
            ctx.fillStyle = '#ffffff'; 
            ctx.font = `bold ${fontSize}px Courier New`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width / 2, 64);
            
            const tex = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.scale.set(size * 4, size, 1);
            sprite.position.y = -(size * 1.5); // Push label BELOW geometry to prevent occlusion
            return sprite;
        }

        // --- RENDERER ROUTINE ---
        function clearGallery() {
            orbGroup.forEach(orb => scene.remove(orb.group)); orbGroup = [];
            scene.children = scene.children.filter(child => !child.userData.isConnectionLine);
        }

        function renderGallery() {
            clearGallery();
            
            // Build Nodes
            ACTIVE_VIEW_DATA.forEach((data, index) => {
                const group = new THREE.Group(); 
                group.position.set(data.x, data.y, data.z);
                
                // Base Geometry
                let geo = data.type === 'FOG_CLOUD' ? new THREE.IcosahedronGeometry(data.size, 1) : new THREE.OctahedronGeometry(data.size);
                let mat = new THREE.MeshStandardMaterial({ 
                    color: data.color, wireframe: data.type === 'FOG_CLOUD', transparent: true, opacity: 0.7 
                });
                const mesh = new THREE.Mesh(geo, mat);
                group.add(mesh);
                
                // Attached Label
                group.add(createDynamicLabel(data.label, data.size, data.color));
                
                scene.add(group); 
                orbGroup.push({ group, mesh, ...data });
            });

            // Build Connection Lines based on AXIOMIC LINK_MODE
            if (window.CURRENT_LINK_MODE === 'RADIAL' && orbGroup.length > 0) {
                const centerNode = new THREE.Vector3(orbGroup[0].x, orbGroup[0].y, orbGroup[0].z);
                for(let i = 1; i < orbGroup.length; i++) {
                    drawLine(centerNode, new THREE.Vector3(orbGroup[i].x, orbGroup[i].y, orbGroup[i].z), 0x00ffcc);
                }
            } else if (window.CURRENT_LINK_MODE === 'SEQUENTIAL') {
                for(let i = 0; i < orbGroup.length - 1; i++) {
                    drawLine(
                        new THREE.Vector3(orbGroup[i].x, orbGroup[i].y, orbGroup[i].z),
                        new THREE.Vector3(orbGroup[i+1].x, orbGroup[i+1].y, orbGroup[i+1].z),
                        0xff00ff
                    );
                }
            } else if (window.CURRENT_LINK_MODE === 'VECTOR_MATH' && orbGroup.length === 4) {
                // Vector Math explicit routing: Base(0) -> Sub(1) -> Add(2) -> Target(3)
                drawLine(new THREE.Vector3(orbGroup[0].x, orbGroup[0].y, orbGroup[0].z), new THREE.Vector3(orbGroup[1].x, orbGroup[1].y, orbGroup[1].z), 0xff0044, true); // Red Subtraction
                drawLine(new THREE.Vector3(orbGroup[1].x, orbGroup[1].y, orbGroup[1].z), new THREE.Vector3(orbGroup[2].x, orbGroup[2].y, orbGroup[2].z), 0x00ff00, true); // Green Addition
                drawLine(new THREE.Vector3(orbGroup[2].x, orbGroup[2].y, orbGroup[2].z), new THREE.Vector3(orbGroup[3].x, orbGroup[3].y, orbGroup[3].z), 0xfacc15, false); // Gold Result
            }
        }

        function drawLine(v1, v2, colorHex, isDashed = false) {
            const geo = new THREE.BufferGeometry().setFromPoints([v1, v2]);
            const mat = isDashed 
                ? new THREE.LineDashedMaterial({ color: colorHex, dashSize: 2, gapSize: 2 })
                : new THREE.LineBasicMaterial({ color: colorHex, transparent: true, opacity: 0.6 });
            const line = new THREE.Line(geo, mat);
            if (isDashed) line.computeLineDistances();
            line.userData.isConnectionLine = true;
            scene.add(line);
        }

        function animate() {
            requestAnimationFrame(animate);
            orbGroup.forEach((orb) => {
                orb.mesh.rotation.x += 0.005;
                orb.mesh.rotation.y += 0.005;
            });
            controls.update(); 
            renderer.render(scene, camera);
        }

        // --- UI LOGGING ---
        function logAction(msg, color = '#00ffcc') {
            const feed = document.getElementById('logFeed');
            const div = document.createElement('div');
            const time = new Date().toLocaleTimeString();
            div.innerHTML = `<span style="opacity:0.4;">[${time}]</span> <span style="color:${color}; font-weight:bold;">${msg}</span>`;
            feed.appendChild(div);
            feed.scrollTop = feed.scrollHeight;
        }
        function setStatus(status, colorCls) {
            document.getElementById('llmStatusDot').className = `status-dot ${colorCls}`;
            document.getElementById('llmStatus').style.color = colorCls === 'yellow' ? '#facc15' : '#00ffcc';
            document.getElementById('llmStatus').innerText = status;
        }

        // --- TOPOLOGY BUILDERS ---

        function build_SPIRAL_Topology(stages) {
            window.CURRENT_LINK_MODE = 'SEQUENTIAL';
            const newData = [];
            let radius = 60;
            let angle = 0;
            let y = 30;

            stages.forEach((text, i) => {
                newData.push({
                    label: text, type: 'AXIOM_PRISM', color: TOPOLOGY_COLORS[i % TOPOLOGY_COLORS.length], size: 12 - (i*1.5),
                    x: Math.cos(angle) * radius, y: y, z: Math.sin(angle) * radius
                });
                radius *= 0.65; // Collapse inward
                angle += Math.PI * 0.8; // Spiral rotation
                y -= 20; // Move downwards
            });
            ACTIVE_VIEW_DATA = newData;
            renderGallery();
            camera.position.set(0, 80, 80); controls.target.set(0, 0, 0);
        }

        function build_ANTINOMY_Topology(thesis, antithesis, voidText) {
            window.CURRENT_LINK_MODE = 'NONE'; // Lines disabled to emphasize the void
            ACTIVE_VIEW_DATA = [
                { label: `[THESIS]: ${thesis}`, type: 'AXIOM_PRISM', color: 0x0066ff, size: 14, x: -50, y: 0, z: 0 },
                { label: `[ANTITHESIS]: ${antithesis}`, type: 'AXIOM_PRISM', color: 0xff0044, size: 14, x: 50, y: 0, z: 0 },
                { label: `[IRRESOLVABLE_VOID]: ${voidText}`, type: 'FOG_CLOUD', color: 0xffffff, size: 20, x: 0, y: 0, z: 0 }
            ];
            renderGallery();
            camera.position.set(0, 40, 120); controls.target.set(0, 0, 0);
        }

        function build_VECTOR_MATH_Topology(base, sub, add, target) {
            window.CURRENT_LINK_MODE = 'VECTOR_MATH';
            ACTIVE_VIEW_DATA = [
                { label: `[BASE] ${base}`, type: 'AXIOM_PRISM', color: 0xffaa00, size: 10, x: 0, y: 30, z: 0 },
                { label: `[- REMOVAL] ${sub}`, type: 'ATOMZ', color: 0xff0044, size: 8, x: -35, y: 0, z: -10 },
                { label: `[+ INJECTION] ${add}`, type: 'ATOMZ', color: 0x00ff00, size: 8, x: 35, y: -20, z: 10 },
                { label: `[= TARGET] ${target}`, type: 'COMPOSITE_CONCEPTS', color: 0xfacc15, size: 18, x: 0, y: -50, z: 20 }
            ];
            renderGallery();
            camera.position.set(0, 20, 110); controls.target.set(0, -10, 0);
        }


        // --- INFERENCE ROUTERS (Simulated for WebGL testing) ---
        function triggerConceptInference(val) {
            setStatus('LLM THINKING...', 'yellow');
            
            if (val === "test_4_1") {
                logAction(`> INITIATING [SOCRATIC_ELENCHUS] APORIA GENERATOR`, '#facc15');
                setTimeout(() => {
                    build_SPIRAL_Topology([
                        "JUSTICE is fairness in law.", 
                        "But what if the law is inherently unfair?", 
                        "Then JUSTICE requires breaking the law.", 
                        "If breaking law is JUSTICE, what defines the baseline?", 
                        "[APORIA: The Paradox of Lawless Justice]"
                    ]);
                    setStatus('LLM STANDBY', 'green');
                    logAction(`[SYS] Aporia Spiral rendering complete.`, '#ff00ff');
                }, 1500);
            } 
            else if (val === "test_4_2") {
                logAction(`> INITIATING [KANTIAN_ANTINOMY] IRRESOLVABLE PARADOX`, '#facc15');
                setTimeout(() => {
                    build_ANTINOMY_Topology(
                        "The Universe has a definite beginning.", 
                        "The Universe is infinite and eternal.", 
                        "Human cognition cannot process absolute boundaries."
                    );
                    setStatus('LLM STANDBY', 'green');
                    logAction(`[SYS] Kantian Void rendering complete.`, '#ff00ff');
                }, 1500);
            }
            else if (val === "test_4_3") {
                logAction(`> INITIATING [LATENT_VECTOR_TRANSLATION] CONCEPT MATH`, '#facc15');
                setTimeout(() => {
                    build_VECTOR_MATH_Topology(
                        "KNOWLEDGE", 
                        "EXPERIENCE", 
                        "DOGMA", 
                        "ZEALOTRY"
                    );
                    setStatus('LLM STANDBY', 'green');
                    logAction(`[SYS] Vector Math coordinates locked.`, '#ff00ff');
                }, 1500);
            }
        }

        window.onload = init3D;
    </script>
</body>
</html>
